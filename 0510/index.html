<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sanitize.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="field.css">
  <title>football strategy ver1.01</title>
</head>
<body>
  <div class="bg_pattern Paper_v2"></div>
  <script type="module" src="js/main.js"></script>
  <header>        
    <div class="legend infopart">  
        <img src="figure/title.png" alt="スタメン配置" id="title" class="box">      
        <div class="icon box ">
            <span class="home-chip">神戸</span>:
            <select id="homeTeamSelect">
                <option value="kobe">神戸</option>
                <option value="marinos">横浜FM</option>
                <option value="antlers">鹿島</option>
                <option value="kashiwa">柏</option>
                <option value="gohsaka">G大阪</option>
                <option value="hiroshima">広島</option>
                <option value="shimizu">清水</option>
                <option value="kobe_AwayVer">神戸(A)</option>
                <option value="kobe_30th">神戸(30th)</option>
                <option value="marinos_AwayVer">横浜FM(A)</option>
                <option value="antlers_AwayVer">鹿島(A)</option>
                <option value="kashiwa_AwayVer">柏(A)</option>
                <option value="gohsaka_AwayVer">G大阪(A)</option>
                <option value="hiroshima_AwayVer">広島(A)</option>
            </select>
        </div>        
        <div class="icon box ">
            <span class="away-chip">Away: 奥側</span>:
            <select id="awayTeamSelect">
                <option value="kobe">神戸</option>
                <option value="marinos">横浜FM</option>
                <option value="antlers">鹿島</option>
                <option value="kashiwa">柏</option>
                <option value="gohsaka">G大阪</option>
                <option value="hiroshima">広島</option>
                <option value="shimizu">清水</option>
                <option value="kobe_AwayVer">神戸(A)</option>
                <option value="kobe_30th">神戸(30th)</option>
                <option value="marinos_AwayVer">横浜FM(A)</option>
                <option value="antlers_AwayVer">鹿島(A)</option>
                <option value="kashiwa_AwayVer">柏(A)</option>
                <option value="gohsaka_AwayVer">G大阪(A)</option>
                <option value="hiroshima_AwayVer">広島(A)</option>
            </select>
        </div>  
    </div>
  </header>
  <div class="main">
    <div id="field" class="centering_item">
      <!-- レーン -->
      <div class="lane lane-half-left"></div>
      <div class="lane lane-center-left"></div>
      <div class="lane lane-center-right"></div>
      <div class="lane lane-half-right"></div>

      <!-- ゾーン -->
      <div class="zone-line zone-1"></div>
      <div class="zone-line zone-2"></div>
      <!-- <div class="zone-line zone-3"></div>
      <div class="zone-line zone-4"></div> -->

      <div class="center-line"></div>
      <div class="center-circle"></div>
      <div class="center-spot"></div>

      <div class="penalty-box top"></div>
      <div class="penalty-box bottom"></div>
      <div class="goal-box top"></div>
      <div class="goal-box bottom"></div>

      <div class="penalty-spot top"></div>
      <div class="penalty-spot bottom"></div>

      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <div id="info" class="centering_item">
      <div class="forms-wrapper  infopart">
          <div class="formation-buttons home-formations home-block">
            <button type="button" data-formation="4123"       ><img src="figure/4123.svg" alt="4123"></button>
            <button type="button" data-formation="442"        ><img src="figure/442.svg" alt="442"></button>
            <button type="button" data-formation="442_diamond"><img src="figure/442_diamond.svg" alt="442◇"></button>
            <button type="button" data-formation="4231"       ><img src="figure/4231.svg" alt="4231"></button>
            <button type="button" data-formation="4321"       ><img src="figure/4321.svg" alt="4321"></button>
            <button type="button" data-formation="4141"       ><img src="figure/4141.svg" alt="4141"></button>
            <button type="button" data-formation="3421"       ><img src="figure/3421.svg" alt="3421"></button>            
            <button type="button" data-formation="343"        ><img src="figure/343.svg" alt="343"></button>
            <button type="button" data-formation="352W"       ><img src="figure/352W.svg" alt="352W"></button>
            <button type="button" data-formation="352M"       ><img src="figure/352M.svg" alt="352M"></button>
            <button type="button" data-formation="343_diamond"><img src="figure/343_diamond.svg" alt="343◇"></button>
            <button type="button" data-formation="541"        ><img src="figure/541.svg" alt="541"></button>
          </div>
          
          <div class="formation-buttons away-formations away-block">
            <button type="button" data-formation="4123"       ><img src="figure/4123.svg" alt="4123"></button>
            <button type="button" data-formation="442"        ><img src="figure/442.svg" alt="442"></button>
            <button type="button" data-formation="442_diamond"><img src="figure/442_diamond.svg" alt="442◇"></button>
            <button type="button" data-formation="4231"       ><img src="figure/4231.svg" alt="4231"></button>
            <button type="button" data-formation="4321"       ><img src="figure/4321.svg" alt="4321"></button>
            <button type="button" data-formation="4141"       ><img src="figure/4141.svg" alt="4141"></button>
            <button type="button" data-formation="3421"       ><img src="figure/3421.svg" alt="3421"></button>            
            <button type="button" data-formation="343"        ><img src="figure/343.svg" alt="343"></button>
            <button type="button" data-formation="352W"       ><img src="figure/352W.svg" alt="352W"></button>
            <button type="button" data-formation="352M"       ><img src="figure/352M.svg" alt="352M"></button>
            <button type="button" data-formation="343_diamond"><img src="figure/343_diamond.svg" alt="343◇"></button>
            <button type="button" data-formation="541"        ><img src="figure/541.svg" alt="541"></button>
          </div>
      </div>
      <div class="sliderpart  infopart">
        <p>
          <div class="whichpara">backs</div>          
          <input type="range" id="backsSlider" min="0" max="1" step="1" value="1" class="switch">
          <div>|</div>
          <div class="whichpara">DMF</div>          
          <input type="range" id="volanteSlider" min="0" max="1" step="1" value="0" class="switch">
        </p>
        <!-- <div> 4-2-1-3 </div> -->
      </div>  
      <div class="sliderpart  infopart">
          <label class="whichpara">Top</label>          
          <input type="range" id="topSlider" min="0" max="1" step="0.02" value="0.5" class="tops">
      </div>  
      <div class="sliderpart  infopart">
        <label class="whichpara">Anchor</label>          
        <input type="range" id="systemSlider" min="0" max="1" step="0.02" value="1" class = "tops">
      </div>  
      <div class="sliderpart  infopart">
        <label class="whichpara">Low >> Mid >> High</label>          
        <input type="range" id="sideSlider" min="0" max="1" step="0.02" value="0.33" class = "tops">
      </div>  
      <div class="sliderpart  infopart">
        <label class="whichpara">3back化</label>          
        <input type="range" id="sidebackSlider" min="0" max="1" step="0.02" value="0.5" class = "tops">
      </div>  
      <div class="sliderpart infopart"> 
        <label class="whichpara">SBを上げる</label> 
        <input type="range" id="sidbackSlider" min="0" max="1" step="0.02" value="0.5" class="sidback"> 
      </div>
    </div>
    <div class="squadnum infopart centering_item">
      <div class="form-block home-block">      
        <form id="playerFormHome">
          <button class="submit-btn" type="submit">表示</button>            
          <div id="inputsHome"></div>
        </form>
      </div>
      <div class="form-block away-block">
        <form id="playerFormAway">
          <button class="submit-btn" type="submit">表示</button>              
          <div id="inputsAway"></div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
