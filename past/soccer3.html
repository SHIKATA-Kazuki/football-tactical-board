<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>フォーメーション</title>
  <style>
    body { background-color: #006600; margin: 0; font-family: sans-serif; color: white; }
    h1 { text-align: center; padding: 16px 20px; }

    .main { display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 20px; }
    .form-container { background: #004400; padding: 12px; width: 340px; min-width: 280px; border-radius: 8px; }
    .section-title { margin: 8px 0; font-size: 18px; }

    input, select { margin: 4px; padding: 5px; }
    input[type="number"] { width: 38px; }

    .submit-btn { padding: 8px 16px; background-color: #00cc00; color: white; border: none; cursor: pointer; border-radius: 6px; }
    .submit-btn:hover { filter: brightness(1.1); }

    #field { position: relative; width: 600px; height: 600px; background: linear-gradient(#228822, #006600); border: 5px solid white; border-radius: 10px; }

    .player { position: absolute; width: 60px; height: 45px; background-color: rgba(220, 20, 60, 0.92); color: #fff; border-radius: 50%; text-align: center; line-height: 1.2; font-size: 12px; padding-top: 8px; box-shadow: 0 0 5px #000; transform: translate(-50%, -50%); transition: left 0.7s ease, top 0.7s ease; }
    .opponent { background-color:  rgba(255,255,255,0.92); color: #000;}

    .legend { margin-top: 12px; font-size: 12px; opacity: 0.9; }
    .legend span { display: inline-block; padding: 2px 6px; border-radius: 12px; margin-right: 6px; }
    .legend .home-chip { background: rgba(220, 20, 60, 0.92); }
    .legend .away-chip { background: rgba(255,255,255,0.92); color: #000; }
  </style>
</head>
<body>
  <h1>スタメン配置</h1>

  <div class="main">
    <div class="form-container">
      <div class="section-title">ヴィッセル神戸</div>
      <form id="playerFormHome">
        <div id="inputsHome"></div>
        <div>
          <label for="formationSelectHome">フォーメーション：</label>
          <select id="formationSelectHome">
            <option value="433">4-3-3</option>
            <option value="442">4-4-2</option>
            <option value="4231">4-2-3-1</option>
            <option value="343_diamond">3-4-3_dia</option>
            <option value="343">3-4-3</option>
            <option value="3421">3-4-2-1</option>
            <option value="3412">3-4-1-2</option>
            <option value="3322">3-3-2-2</option>
          </select>
        </div>
        <button class="submit-btn" type="submit">表示</button>
      </form>

      <hr style="margin: 12px 0; border-color: rgba(255,255,255,0.2);" />

      <div class="section-title">対戦チーム</div>
      <form id="playerFormAway">
        <div id="inputsAway"></div>
        <div>
          <label for="formationSelectAway">フォーメーション：</label>
          <select id="formationSelectAway">
            <option value="442">4-4-2</option>
            <option value="433">4-3-3</option>
            <option value="4231">4-2-3-1</option>
            <option value="343_diamond">3-4-3_dia</option>
            <option value="343">3-4-3</option>
            <option value="3421">3-4-2-1</option>
            <option value="3412">3-4-1-2</option>
            <option value="3322">3-3-2-2</option>
          </select>
        </div>
        <button class="submit-btn" type="submit">表示</button>
      </form>

      <div class="legend">
        <span class="home-chip">神戸: 赤</span>
        <span class="away-chip">相: 白</span>
      </div>
    </div>

    <div id="field"></div>
  </div>

  <script>
    // ===== 入力欄生成 =====================================================
    const defaultNamesHome = [
      "前川", "永戸", "トゥーレル", "山川", "酒井",
      "扇原", "井手口", "広瀬", "宮代", "佐々木", "エリキ"
    ];
    const defaultNamesAway = [
      "相手1", "相手2", "相手3", "相手4", "相手5",
      "相手6", "相手7", "相手8", "相手9", "相手10", "相手11"
    ];

    function createInputs(containerId, defaultNames) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      for (let i = 1; i <= 11; i++) {
        container.innerHTML += `
          <div>
            背番号 <input type="number" name="number${i}" value="${i}" required>
            名前 <input type="text" name="name${i}" value="${defaultNames[i - 1]}" required>
          </div>
        `;
      }
    }

    createInputs("inputsHome", defaultNamesHome);
    createInputs("inputsAway", defaultNamesAway);

    // ===== 位置データ（あなたの元コードをそのまま活用） ===================
    const anchor = [50, 63];
    
    //GK, LSB?, LCB, RCB, RCB
    const relativeFormations_442 = [
      [0, 35], [-30, 10], [-10, 15], [10, 15], [30, 10],
      [-15, -5], [15, -5], [-25, -18], [-10, -30], [10, -30], [25, -18]
    ];
    const relativeFormations_433 = [
      [0, 35], [-30, 10], [-10, 15], [10, 15], [30, 10],
      [0, 0], [15, -15], [-25, -30], [-15, -15], [0, -35], [25, -30]
    ];
    const relativeFormations_4231 = [
      [0, 35], [-30, 10], [-10, 15], [10, 15], [30, 10],
      [-15, -5], [15, -5], [-25, -20], [0, -20], [0, -40], [25, -20]
    ];
    const relativeFormations_343 = [
      [0, 35], [-25, 10], [0, 17], [25, 10], [45,-12], 
      [-15, -10], [15, -10], [-45, -12], [-25, -30], [0, -35], [25, -30]
    ];
    const relativeFormations_343_diamond = [
      [0, 35], [-20, -10], [-25, 10],  [25, 10], [20,-10],
      [0, 17], [0, -3], [-35, -35], [0, -25], [0, -40], [35, -35]
    ];
    const relativeFormations_3421 = [
      [0, 35], [-25, 10], [0, 17], [25, 10], [45,-12], 
      [-13, -5], [13, -5], [-42, -10], [-17, -25], [0, -40], [17, -25]
    ];
    const relativeFormations_3412 = [
      [0, 35], [-25, 10], [0, 17], [25, 10], [45,-12], 
      [-13, -5], [13, -5], [-42, -10], [0, -25], [-17, -40], [17, -40]
    ];
    const relativeFormations_3322 = [
      [0, 35], [-25, 10], [0, 17], [25, 10], [45,-12], 
      [0, -5], [15, -14], [-42, -10], [-15, -14], [-10, -35], [10, -35]
    ];

    function toAbsolutePositions(relativeFormations, anchor) {
      return relativeFormations.map(([dx, dy]) => [ anchor[0] + dx, anchor[1] + dy ]);
    }

    const formations = {
      "442": toAbsolutePositions(relativeFormations_442, anchor),
      "433": toAbsolutePositions(relativeFormations_433, anchor),
      "4231": toAbsolutePositions(relativeFormations_4231, anchor),
      "343": toAbsolutePositions(relativeFormations_343, anchor),
      "343_diamond": toAbsolutePositions(relativeFormations_343_diamond, anchor),
      "3421": toAbsolutePositions(relativeFormations_3421, anchor),
      "3412": toAbsolutePositions(relativeFormations_3412, anchor),
      "3322": toAbsolutePositions(relativeFormations_3322, anchor)
    };

    // ===== 描画ロジック ====================================================
    const homePlayers = []; // DOM要素
    const awayPlayers = []; // DOM要素

    function readPlayersFromForm(formEl) {
      const fd = new FormData(formEl);
      const arr = [];
      for (let i = 1; i <= 11; i++) {
        arr.push({ number: fd.get(`number${i}`), name: fd.get(`name${i}`) });
      }
      return arr;
    }

    function placePlayers(players, positions, isOpponent) {
      const field = document.getElementById("field");
      const arr = isOpponent ? awayPlayers : homePlayers;

      // 要素数を合わせる
      while (arr.length < players.length) {
        const div = document.createElement("div");
        div.className = isOpponent ? "player opponent" : "player";
        field.appendChild(div);
        arr.push(div);
      }
      while (arr.length > players.length) {
        const removed = arr.pop();
        removed.remove();
      }

      // 位置とテキスト更新
      for (let i = 0; i < players.length; i++) {
        const el = arr[i];
        // 念のためクラスを再設定（先に作った要素を流用するため）
        el.className = isOpponent ? "player opponent" : "player";
        el.style.left = `${positions[i][0]}%`;
        el.style.top = `${positions[i][1]}%`;
        el.innerHTML = `<strong>#${players[i].number}</strong><br>${players[i].name}`;
      }
    }

    // ===== イベントハンドラ ===============================================
    document.getElementById("playerFormHome").addEventListener("submit", function(e) {
      e.preventDefault();
      const players = readPlayersFromForm(e.target);
      const f = document.getElementById("formationSelectHome").value;
      const pos = formations[f];
      if (!pos) return; // 念のため
      placePlayers(players, pos, false);
    });

    document.getElementById("playerFormAway").addEventListener("submit", function(e) {
      e.preventDefault();
      const players = readPlayersFromForm(e.target);
      const f = document.getElementById("formationSelectAway").value;
      const pos = formations[f];
      if (!pos) return;
      // 相手側は反転（ピッチ逆サイド）
      const flipped = pos.map(([x, y]) => [100 - x, 100 - y]);
      placePlayers(players, flipped, true);
    });

    // （任意）ページ読み込み時に仮表示
    window.addEventListener('load', () => {
      // 自チームだけ即時描画（好みでコメントアウト可）
      const homeForm = document.getElementById('playerFormHome');
      const players = readPlayersFromForm(homeForm);
      placePlayers(players, formations['442'], false);
    });
  </script>
</body>
</html>
