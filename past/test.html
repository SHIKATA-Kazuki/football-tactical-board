<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      background: #333;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    #field {
      position: relative;
      width: 800px;
      height: 1200px;
      background: linear-gradient(#228822, #006600);
      /* border: 5px solid white; */
      border-radius: 10px;
    }
    /* センターライン */
    .center-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 0;
      border-bottom: 3px solid white;
    }
    /* センターサークル */
    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      margin: -100px 0 0 -100px;
      border: 3px solid white;
      border-radius: 50%;
    }
    /* ペナルティエリア */
    .penalty-box {
      position: absolute;
      width: 440px;
      height: 180px;
      left: 50%;
      margin-left: -220px;
      border: 3px solid white;
    }
    .penalty-box.top { bottom: 0; border-bottom: none; }
    .penalty-box.bottom { top: 0; border-top: none; }

    /* ゴールエリア */
    .goal-box {
      position: absolute;
      width: 240px;
      height: 60px;
      left: 50%;
      margin-left: -120px;
      border: 3px solid white;
    }
    .goal-box.top { bottom: 0; border-bottom: none; }
    .goal-box.bottom { top: 0; border-top: none; }

    /* ペナルティスポット */
    .penalty-spot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      left: 50%;
      margin-left: -5px;
    }
    .penalty-spot.top { top: 120px; }
    .penalty-spot.bottom { bottom: 120px; }

    /* センタースポット */
    .center-spot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      margin: -5px 0 0 -5px;
      background: white;
      border-radius: 50%;
    }

    /* コーナーアーク */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border: 3px solid white;
      border-radius: 50%;
    }
    .corner.tl { top: -20px; left: -20px; }
    .corner.tr { top: -20px; right: -20px; }
    .corner.bl { bottom: -20px; left: -20px; }
    .corner.br { bottom: -20px; right: -20px; }
  </style>
</head>
<body>
  <div id="field">
    <div class="center-line"></div>
    <div class="center-circle"></div>
    <div class="center-spot"></div>

    <div class="penalty-box top"></div>
    <div class="penalty-box bottom"></div>
    <div class="goal-box top"></div>
    <div class="goal-box bottom"></div>

    <div class="penalty-spot top"></div>
    <div class="penalty-spot bottom"></div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</body>
</html>
