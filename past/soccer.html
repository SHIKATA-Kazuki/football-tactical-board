<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>サッカーフォーメーション</title>
  <style>
    body {
      background-color: #006600;
      margin: 0;
      font-family: sans-serif;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .form-container {
      background: #004400;
      text-align: center;
      padding: 10px;
    }

    input, select {
      margin: 5px;
      padding: 5px;
    }

    .submit-btn {
      padding: 10px 20px;
      background-color: #00cc00;
      color: white;
      border: none;
      cursor: pointer;
    }

    #field {
      position: relative;
      width: 80%;
      height: 600px;
      background: linear-gradient(#228822, #006600);
      margin: 20px auto;
      border: 5px solid white;
      border-radius: 10px;
    }

    .player {
      position: absolute;
      width: 70px;
      height: 70px;
      background-color: rgba(255,255,255,0.9);
      color: #000;
      border-radius: 50%;
      text-align: center;
      line-height: 1.2;
      font-size: 12px;
      padding-top: 8px;
      box-shadow: 0 0 5px #000;
    }
  </style>
</head>
<body>
  <h1>スタメン配置（オブジェクトベース）</h1>

  <div class="form-container">
    <form id="playerForm">
      <div id="inputs"></div>
      <select id="formationSelect">
        <option value="442">4-4-2</option>
        <option value="433">4-3-3</option>
        <option value="4231">4-2-3-1</option>
        <option value="343">3-4-3</option>
      </select>
      <br>
      <button class="submit-btn" type="submit">表示する</button>
    </form>
  </div>

  <div id="field"></div>

  <script>
    const defaultNames = [
      "前川", "飯野", "トゥーレル", "山川", "永戸",
      "扇原", "井手口", "広瀬", "宮代", "大迫", "武藤"
    ];

    // プレイヤー入力欄生成
    const inputArea = document.getElementById("inputs");
    for (let i = 1; i <= 11; i++) {
      inputArea.innerHTML += `
        <div>
          背番号 <input type="number" name="number${i}" value="${i}" required>
          名前 <input type="text" name="name${i}" value="${defaultNames[i - 1]}" required>
        </div>
      `;
    }

    const anchor = [50, 60];

    // 各フォーメーションに応じた座標指定（%）
    const relativeFormations_422 = [
      [0, 35],     // 1: GK
      [30, 10],     // 2: 右SB
      [10, 15],     // 3: CB
      [-10, 15],     // 4: CB
      [-30, 10],     // 5: 左SB or CB
      [15, -5],     // 6: 左ボランチ
      [-15, 5],     // 7: 右ボランチ
      [25, 42],     // 8: LWG
      [40, 30],     // 9: CF
      [60, 30],     // 10: CF
      [75, 42],     // 11: RWG
    ];
    // 他フォーメーションも同様に調整可能（希望あれば）
    const relativeFormations_433 = [
      [50, 95],     // 1: GK
      [80, 70],     // 2: 右SB
      [60, 75],     // 3: CB
      [40, 75],     // 4: CB
      [20, 70],     // 5: 左SB or CB
      [50, 60],     // 6: アンカー
      [65, 45],     // 7: 右ボランチ
      [25, 30],     // 8: LSH
      [35, 45],     // 9: OH
      [50, 25],     // 10:CF
      [75, 30]      // 11:RSH
    ];
    const relativeFormations_4231 = [
      [50, 95],     // 1: GK
      [80, 70],     // 2: 右SB
      [60, 75],     // 3: CB
      [40, 75],     // 4: CB
      [20, 70],     // 5: 左SB or CB
      [65, 55],     // 6: 左ボランチ
      [35, 55],     // 7: 右ボランチ
      [25, 40],     // 8: 
      [50, 40],     // 9: 
      [50, 25],     // 10:
      [75, 40]      // 11:
    ];
    const relativeFormations_343 = [
      [50, 90],
      [30, 70], [50, 70], [70, 70],
      [20, 50], [40, 50], [60, 50], [80, 50],
      [25, 30], [50, 30], [75, 30]
    ];

    function
    toAbsolutePositions(relativeFormations, anchor){
      return relativeFormations.map(([dx, dy]) => [
        anchor[0] + dx ,
        anchor[1] + dy
      ]);
    }
    const formations = {
      "442":
      toAbsolutePositions(relativeFormations_442,
      anchor),
      "433":
      toAbsolutePositions(relativeFormations_433,
      anchor),
      "4231":
      toAbsolutePositions(relativeFormations_4231,
      anchor),
      "343":
      toAbsolutePositions(relativeFormations_343,
      anchor)
    }

    // submitイベント処理
    document.getElementById("playerForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const formData = new FormData(e.target);
      const players = [];

      for (let i = 1; i <= 11; i++) {
        players.push({
          number: formData.get(`number${i}`),
          name: formData.get(`name${i}`)
        });
      }

      const selectedFormation = document.getElementById("formationSelect").value;
      const positions = formations[selectedFormation];
      const field = document.getElementById("field");
      field.innerHTML = ""; // クリア

      for (let i = 0; i < players.length; i++) {
        const player = document.createElement("div");
        player.className = "player";
        player.style.left = `${positions[i][0]}%`;
        player.style.top = `${positions[i][1]}%`;
        player.style.transform = "translate(-50%, -50%)";
        player.innerHTML = `<strong>#${players[i].number}</strong><br>${players[i].name}`;
        field.appendChild(player);
      }
    });
  </script>
</body>
</html>
