  <script>
    // =============================================
    // ハンバーガーメニュー開閉
    // =============================================
    const toggle  = document.getElementById('menu-toggle');
    const drawer  = document.getElementById('drawer');
    const overlay = document.getElementById('drawer-overlay');

    function openDrawer() {
      drawer.classList.add('open');
      overlay.classList.add('open');
      toggle.classList.add('open');
      toggle.setAttribute('aria-label', 'メニューを閉じる');
    }
    function closeDrawer() {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-label', 'メニューを開く');
    }

    toggle.addEventListener('click', () => {
      drawer.classList.contains('open') ? closeDrawer() : openDrawer();
    });
    overlay.addEventListener('click', closeDrawer);

    // =============================================
    // SP スライダーを PC スライダーに同期
    // （実体は PC スライダー。SP スライダーは鏡）
    // =============================================
    const pairs = [
      ['backsSlider',   'backsSlider-sp'],
      ['volanteSlider', 'volanteSlider-sp'],
      ['topSlider',     'topSlider-sp'],
      ['sidbackUpDown', 'sidbackUpDown-sp'],
      ['lineSlider',    'lineSlider-sp'],
    ];

    window.addEventListener('DOMContentLoaded', () => {
      pairs.forEach(([pcId, spId]) => {
        const pc = document.getElementById(pcId);
        const sp = document.getElementById(spId);
        if (!pc || !sp) return;

        // SP → PC に値を転送してから PC の input イベントを発火
        sp.addEventListener('input', () => {
          pc.value = sp.value;
          pc.dispatchEvent(new Event('input', { bubbles: true }));
        });

        // PC → SP に値を反映
        pc.addEventListener('input', () => { sp.value = pc.value; });
      });

      // SP フォーメーションボタン → PC ボタンをクリック
      document.querySelectorAll('#drawer .formation-buttons button').forEach(spBtn => {
        spBtn.addEventListener('click', () => {
          const f       = spBtn.dataset.formation;
          const isAway  = spBtn.closest('.away-formations') !== null;
          const pcSel   = isAway
            ? `#info .away-formations button[data-formation="${f}"]`
            : `#info .home-formations button[data-formation="${f}"]`;
          const pcBtn   = document.querySelector(pcSel);
          if (pcBtn) pcBtn.click();

          // SP 側のアクティブ状態も更新
          const spGroup = isAway
            ? '#drawer .away-formations button'
            : '#drawer .home-formations button';
          document.querySelectorAll(spGroup).forEach(b => b.classList.remove('active'));
          spBtn.classList.add('active');
        });
      });

      // PC フォーメーションボタンのアクティブ → SP にも反映
      document.querySelectorAll('#info .formation-buttons button').forEach(pcBtn => {
        pcBtn.addEventListener('click', () => {
          const f      = pcBtn.dataset.formation;
          const isAway = pcBtn.closest('.away-formations') !== null;
          const spSel  = isAway
            ? `#drawer .away-formations button[data-formation="${f}"]`
            : `#drawer .home-formations button[data-formation="${f}"]`;
          document.querySelectorAll(
            isAway ? '#drawer .away-formations button' : '#drawer .home-formations button'
          ).forEach(b => b.classList.remove('active'));
          document.querySelector(spSel)?.classList.add('active');
        });
      });

      // SP submit → PC form submit
      document.getElementById('playerFormHome-sp')?.addEventListener('submit', (e) => {
        e.preventDefault();
        document.getElementById('playerFormHome')?.dispatchEvent(new Event('submit'));
      });
      document.getElementById('playerFormAway-sp')?.addEventListener('submit', (e) => {
        e.preventDefault();
        document.getElementById('playerFormAway')?.dispatchEvent(new Event('submit'));
      });
    });
  </script>
